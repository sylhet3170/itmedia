  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .premium-nav {
      background: rgba(10, 25, 47, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hero-grad {
      background: linear-gradient(135deg, #0B1120 0%, #111827 50%, #1E1B4B 100%);
      position: relative;
      overflow: hidden;
    }

    .hero-grad::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" fill="none"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.03)"/><circle cx="75" cy="75" r="0.5" fill="rgba(255,255,255,0.02)"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grain)"/></svg>');
      pointer-events: none;
    }

    .card-hover {
      transition: all .3s ease;
    }

    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.15);
    }

    .btn-grad {
      background: linear-gradient(95deg, #4F46E5, #7C3AED);
      transition: all 0.3s ease;
    }

    .btn-grad:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
    }

    .frame-img {
      transition: transform .5s;
    }

    .group:hover .frame-img {
      transform: scale(1.06);
    }

    .stats-counter {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(45deg, #4F46E5, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Mobile Menu */
    .mobile-menu {
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .mobile-menu.open {
      transform: translateX(0);
    }

    /* Floating WhatsApp */
    .whatsapp-float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 40px;
      right: 40px;
      background: linear-gradient(45deg, #25D366, #128C7E);
      color: white;
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .whatsapp-float:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(37, 211, 102, 0.5);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.2rem;
        line-height: 1.2;
      }
      
      .nav-links {
        display: none;
      }
      
      .stats-counter {
        font-size: 2rem;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
