<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Service Order System</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-white text-slate-900">

<!-- ================= HEADER ================= -->
<header class="fixed w-full top-0 bg-white border-b border-yellow-300 z-50">
  <div class="max-w-6xl mx-auto px-4 h-[60px] flex justify-between items-center">

    <h1 class="font-bold">VIP Services</h1>

    <a href="https://wa.me/8801814502810"
       class="bg-yellow-400 text-black px-4 py-2 rounded-full text-sm font-bold">
      WhatsApp
    </a>

  </div>
</header>

<!-- ================= LIST ================= -->
<section class="pt-[80px] pb-10 px-4">

  <div class="max-w-3xl mx-auto">

    <h2 class="text-2xl font-bold text-center text-yellow-600 mb-6">Our VIP Services</h2>

    <!-- SERVICE LIST -->
    <div class="space-y-3">

      <!-- 1 -->
      <button onclick="openModal('Web Design','Professional modern responsive website design for business growth.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        01. Web Design
      </button>

      <!-- 2 -->
      <button onclick="openModal('Digital Marketing','Facebook Ads, Google Ads & online marketing growth service.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        02. Digital Marketing
      </button>

      <!-- 3 -->
      <button onclick="openModal('SEO Service','Rank your website on Google top position.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        03. SEO Service
      </button>

      <!-- 4 -->
      <button onclick="openModal('Graphic Design','Logo, banner, poster & brand identity design.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        04. Graphic Design
      </button>

      <!-- 5 -->
      <button onclick="openModal('App Development','Android & iOS mobile application development.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        05. App Development
      </button>

      <!-- 6 -->
      <button onclick="openModal('E-commerce Website','Online shop setup with payment integration.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        06. E-commerce Website
      </button>

      <!-- 7 -->
      <button onclick="openModal('Online Services','Passport, NID, government online applications support.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        07. Online Services
      </button>

      <!-- 8 -->
      <button onclick="openModal('Video Editing','Professional video editing for social media & ads.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        08. Video Editing
      </button>

      <!-- 9 -->
      <button onclick="openModal('Branding','Full business brand identity creation.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        09. Branding
      </button>

      <!-- 10 -->
      <button onclick="openModal('Hosting Setup','Domain, hosting & website setup support.')"
        class="w-full text-left p-4 border rounded-xl hover:border-yellow-400">
        10. Hosting Setup
      </button>

    </div>

  </div>
</section>

<!-- ================= MODAL ================= -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center px-4">

  <div class="bg-white w-full max-w-md rounded-2xl p-5">

    <h3 id="title" class="text-xl font-bold text-yellow-600"></h3>

    <p id="desc" class="text-sm text-slate-600 mt-2"></p>

    <a id="orderBtn"
       class="block mt-5 text-center bg-green-500 text-white py-3 rounded-xl font-bold">
      Order on WhatsApp
    </a>

    <button onclick="closeModal()" class="mt-3 text-sm text-red-500 w-full">
      Close
    </button>

  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>
let number = "8801814502810";

function openModal(title, desc){
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("title").innerText = title;
  document.getElementById("desc").innerText = desc;

  let msg = `Hello, I want to order: ${title}`;
  document.getElementById("orderBtn").href =
    `https://wa.me/${number}?text=` + encodeURIComponent(msg);
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}
</script>

</body>
</html>
